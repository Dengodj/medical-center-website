<header class="main-header">
  <a routerLink="/" class="logo-wrapper">
    <img src="images/logo.png" alt="Medical Center Logo" class="logo-icon" />
    <strong class="logo">
      {{ appService.text()['logoTitle']
      }}<span class="text-accent">{{ appService.text()['logoAccent'] }}</span>
    </strong>
  </a>

  <span class="spacer"></span>

  <div class="lang-bar">
    <button [class.active]="appService.currentLang() === 'ua'" (click)="changeLang('ua')">
      UA
    </button>
    <button [class.active]="appService.currentLang() === 'en'" (click)="changeLang('en')">
      EN
    </button>
    <button [class.active]="appService.currentLang() === 'ru'" (click)="changeLang('ru')">
      RU
    </button>
    <button [class.active]="appService.currentLang() === 'pl'" (click)="changeLang('pl')">
      PL
    </button>
  </div>
</header>
